# Stronger LoRA + cosine schedule + small warmup + mild regularization + class balance hint.
# Run: python -m src.scripts.run_finetune_gemma --config configs/default.yaml --overrides configs/finetune_answer_only_5epochs_improved.yaml
# Then evaluate with the same finetune_output_dir override.
llm:
  finetune_output_dir: "models/gemma_finetuned_answer_only_5epochs_improved"
  finetune:
    answer_only_loss: true
    max_length: 2048
    num_train_epochs: 5
    lora_r: 32
    lora_alpha: 64
    learning_rate: 0.0001
    warmup_ratio: 0.06
    lr_scheduler_type: cosine
    gradient_accumulation_steps: 2
    weight_decay: 0.01
    load_best_model_at_end: true
    oversample_positive_copies: 1
