# Full-dataset LLM pipeline: local Gemma-4 + prompts_v2 on full_dataset rows.
# The SLURM job copies full_dataset.csv -> test.csv before running.
#
# max_input_tokens / max_new_tokens: bound VRAM and decode cost on 16GB GPUs (avoids
# CPU offload from device_map=auto + huge prompts). Few-shot needs more headroom than 1536.
# device_map single: keep weights on one GPU instead of offloading layers to CPU (much faster).

paths:
  processed: "data/processed/mimiciii_full_dataset"
  outputs: "data/outputs/mimiciii_llm_gemma4_promptv2_full_dataset"

llm:
  provider: local_gemma
  model_name: models/hf_snapshots/google--gemma-4-e4b-it
  model: models/hf_snapshots/google--gemma-4-e4b-it
  prompt_template_dir: "prompts_v2"
  cache_dir: "data/outputs/mimiciii_llm_gemma4_promptv2_full_dataset/llm_cache"
  max_input_tokens: 3072
  max_new_tokens: 128
  device_map: single
