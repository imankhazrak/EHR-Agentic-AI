# MIMIC-III lipid disorder next-visit prediction — default experiment config
# Paths are relative to the repository root (cwd when running scripts).

seed: 42

paths:
  mimic_raw: "data/mimic III/physionet.org/files/mimiciii/1.4"
  interim: "data/interim/mimiciii"
  processed: "data/processed/mimiciii"
  # New runs go here so archived comparison trees are untouched:
  #   mimiciii (GPT-4o-mini), mimiciii_gemma, mimiciii_gpt4o_mini, etc.
  # Override per run: env EHR_OUTPUTS_DIR, or a small YAML --overrides file, or copy this config.
  outputs: "data/outputs/mimiciii_llm_promptv2_gemma"

data:
  min_visits: 2
  test_size: 0.2
  stratify_test: true
  # Optional: cap rows after label step (debug only). Omit or null for full data.
  max_pairs: null

narrative:
  style: bullet
  max_diagnoses: 50
  max_medications: 50
  max_procedures: 50
  empty_placeholder: "None recorded"

# Optional second-stage fusion (structured + LLM logit probs): merge configs/fusion_default.yaml
# and see README §8 and docs/fusion_experiment_report.md.

ml:
  models:
    - decision_tree
    - logistic_regression
    - random_forest
  feature_type: bag_of_codes
  few_shot_n: 6

llm:
  # Jinja templates for predictor + critic (relative to repo root). Use prompts_v2 for current experiments.
  prompt_template_dir: "prompts_v2"
  provider: local_gemma
  # Local snapshot from: python -m src.scripts.download_gemma_model --model-id google/gemma-4-e4b-it
  model_name: "models/hf_snapshots/google--gemma-4-e4b-it"
  mode: inference
  device: "cuda"
  use_vllm: false
  max_new_tokens: 256
  # Optional: OpenAI-compatible local vLLM endpoint when use_vllm=true
  vllm_base_url: null
  vllm_api_key: "not-used"
  finetune_output_dir: "models/gemma_finetuned"
  finetune:
    # Split processed/train.csv into train_ft/val_ft, while keeping processed/test.csv untouched.
    val_ratio_within_train: 0.15
    split_seed: 42
    force_rebuild_split: false
    smoke: false
    smoke_max_train_samples: 64
    smoke_max_eval_samples: 32
    smoke_max_steps: 3
    gradient_checkpointing: true
    force_fp32: true
    max_grad_norm: 1.0
    # Publication-safe speedups: reduce evaluation/checkpoint overhead.
    # Final reported metrics should still come from full held-out evaluation.
    evaluation_strategy: epoch
    eval_steps: 200
    logging_steps: 20
    save_strategy: epoch
    save_steps: 1000
    # Optional optimization knobs (see configs/finetune_answer_only_5epochs_improved.yaml).
    warmup_ratio: 0.0
    lr_scheduler_type: linear
    gradient_accumulation_steps: 1
    weight_decay: 0.0
    load_best_model_at_end: false
    oversample_positive_copies: 0
    answer_only_loss: true
    max_length: 2048
    learning_rate: 0.00005
    batch_size: 2
    num_train_epochs: 1
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    # Needed by Gemma-4 with current peft versions.
    lora_target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
  # Backward-compatible aliases used by legacy clients
  model: "models/hf_snapshots/google--gemma-4-e4b-it"
  # Optional: OpenAI-compatible proxy (e.g. Azure gateway). Default: api.openai.com
  base_url: null
  temperature: 0.0
  max_tokens: 256
  seed: 42
  cache_responses: true
  # Keep cache under the same outputs root (or set EHR_LLM_CACHE_DIR).
  cache_dir: "data/outputs/mimiciii_llm_promptv2_gemma/llm_cache"
  rate_limit_rpm: 30
  request_logprobs: false
  # Optional: only first N test rows (debug smoke). null = full test set.
  max_test_samples: null

few_shot:
  n_positive: 3
  n_negative: 3
  strategy: random_balanced
  seed: 42

coagent:
  calibration_size: 200
  n_wrong_samples: 30
  critic_batch_size: 10
  n_critic_rounds: 3
  consolidation_method: llm

evaluation:
  bootstrap_ci: false
