# Overrides for fast smoke tests — merge with: --overrides configs/debug_small.yaml

data:
  max_pairs: 3000
  test_size: 0.25
  stratify_test: true

llm:
  max_test_samples: 12
  rate_limit_rpm: 60
  cache_responses: true
  finetune:
    smoke: true
    force_rebuild_split: true
    val_ratio_within_train: 0.15
    split_seed: 42
    smoke_max_train_samples: 48
    smoke_max_eval_samples: 24
    smoke_max_steps: 2

few_shot:
  n_positive: 2
  n_negative: 2

coagent:
  calibration_size: 24
  n_wrong_samples: 8
  critic_batch_size: 4
  n_critic_rounds: 2
