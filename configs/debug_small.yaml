# Overrides for fast smoke tests — merge with: --overrides configs/debug_small.yaml

paths:
  # Isolated smoke outputs (does not overwrite mimiciii / mimiciii_gemma archives).
  outputs: "data/outputs/mimiciii_llm_smoke"

data:
  max_pairs: 3000
  test_size: 0.25
  stratify_test: true

llm:
  max_test_samples: 20
  rate_limit_rpm: 60
  cache_responses: true
  cache_dir: "data/outputs/mimiciii_llm_smoke/llm_cache"
  finetune:
    smoke: true
    force_rebuild_split: true
    val_ratio_within_train: 0.15
    split_seed: 42
    smoke_max_train_samples: 8
    smoke_max_eval_samples: 4
    smoke_max_steps: 2
    max_length: 256
    batch_size: 1
    gradient_checkpointing: true
    force_fp32: true
    max_grad_norm: 1.0
    learning_rate: 0.00005
    lora_r: 4
    lora_alpha: 8

few_shot:
  n_positive: 2
  n_negative: 2

coagent:
  calibration_size: 24
  n_wrong_samples: 8
  critic_batch_size: 4
  n_critic_rounds: 2
